name: Build Kernel
on: workflow_dispatch

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-22.04
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
    - uses: actions/checkout@v4
    - name: Prepare Environment
      run: |
        grep -v -E "^#|^\n" config.env | sed 's/ #.*//; s/#.*//' >> $GITHUB_ENV
        sudo apt-get update && sudo apt-get install -y \
        git ccache build-essential \
        bison flex libssl-dev \
        bzip2 libbz2-dev liblz4-tool zlib1g-dev \
        gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
        libncurses5-dev libncursesw5-dev \
        libxml2-utils squashfs-tools \
        python3 device-tree-compiler
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: Remove unused packages
      if: env.REMOVE_UNUSED_PACKAGES == 'true'
      uses: jlumbroso/free-disk-space@main
      with: { tool-cache: true, android: false, dotnet: true, haskell: true, large-packages: true, docker-images: true, swap-storage: false }

    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with: { swap-size-gb: 10 }

    - name: Download Toolchain
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        if [ "${{ env.USE_CUSTOM_CLANG }}" == 'true' ]; then
          TOOLCHAIN_SOURCE="${{ env.CUSTOM_CLANG_SOURCE }}"
        elif [ "${{ env.ENABLE_GCC_AOSP }}" == 'true' ]; then
          TOOLCHAIN_SOURCE="https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/${{ env.ENABLE_GCC_ARM64 && 'aarch64/aarch64-linux-android-4.9' || 'arm/arm-linux-androideabi-4.9' }}+archive/refs/tags/android-12.1.0_r27.tar.gz"
        else
          echo "No toolchain specified." && exit 1
        fi

        if [[ $TOOLCHAIN_SOURCE == *'.tar.gz' ]]; then
          wget -nv -O toolchain.tar.gz $TOOLCHAIN_SOURCE && mkdir toolchain && tar -C toolchain/ -zxvf toolchain.tar.gz
        elif [[ $TOOLCHAIN_SOURCE == *'.git' ]]; then
          git clone $TOOLCHAIN_SOURCE -b ${{ env.CUSTOM_CLANG_BRANCH }} toolchain --depth=1
        else
          echo "Unsupported toolchain source format." && exit 1
        fi

    - name: Download kernel source
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --recursive ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel --depth=1
        echo "LOCALVERSION=$(cat android-kernel/localversion)" >> $GITHUB_ENV

    - name: Setup Kernel Configuration
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        for patch in KSU_HOOKS_PATCH OLD_ANDROID_SUPPORT; do
          if [ "${{ env['ADD_' }}${{ patch }}${{ '_CONFIG'] }}" == 'true' ]; then
            git apply $GITHUB_WORKSPACE/patches/${patch}.patch && echo "CONFIG_${patch}=y" >> arch/${{ env.KERNEL_ARCH }}/configs/${{ env.KERNEL_CONFIG }}
          fi
        done

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        if [ "${{ env.USE_CUSTOM_GCC }}" == 'true' ]; then
          export PATH=$GITHUB_WORKSPACE/kernel_workspace/gcc-bin:$PATH
          CC=gcc
        else
          export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-bin:$PATH
          CC=clang
        fi
        make -j$(nproc --all) CC=$CC O=out ARCH=${{ env.KERNEL_ARCH }} ${{ env.KERNEL_CONFIG }}

    - name: Check kernel output
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        if [ -f android-kernel/out/arch/${{ env.KERNEL_ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} ]; then
          echo "CHECK_FILE_IS_OK=true" >> $GITHUB_ENV
        else
          echo "Kernel output file is empty" && exit 1
        fi

    - name: Upload artifacts
      if: env.CHECK_FILE_IS_OK == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: Kernel Artifacts
        path: |
          kernel_workspace/AnyKernel3/*
          kernel_workspace/android-kernel/out/arch/${{ env.KERNEL_ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }}
